name: Release

# Not yet the active release path: publishing still happens locally via
# `npm run release`. To cut over, the maintainer must add an NPM_TOKEN
# secret (an npm automation token with publish rights) and start pushing
# `vX.Y.Z` tags instead of running `npm publish` from a laptop. Provenance
# (--provenance below) can only be attached when publishing from a CI
# environment with OIDC support (the id-token: write permission) — it
# cannot be produced by a local `npm publish`, which is why the local
# release script correctly omits that flag.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance
